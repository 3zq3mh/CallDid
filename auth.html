<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#22c55e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Calldid</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #22c55e; --green-dark: #16a34a;
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --surface3: #2e2e2e;
  --border: rgba(255,255,255,0.08); --text: #f5f5f5; --muted: #888; --red: #ef4444;
  --gold: #f59e0b; --radius: 14px; --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
.app { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: calc(var(--safe-top) + 40px) 24px calc(var(--safe-bottom) + 40px); }
.card { width: 100%; max-width: 400px; }
.logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
.logo span { color: var(--green); }
.tagline { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
.tabs { display: flex; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
.tab { flex: 1; padding: 10px; border-radius: 9px; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: none; color: var(--muted); }
.tab.active { background: var(--surface); color: var(--text); }
.field { margin-bottom: 14px; }
.f-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; font-weight: 500; }
.input { width: 100%; padding: 13px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
.input:focus { border-color: var(--green); }
.input::placeholder { color: var(--muted); }
.loc-row { display: flex; gap: 8px; }
.loc-row .input { flex: 1; }
.loc-btn { padding: 13px 14px; background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--green); cursor: pointer; font-size: 16px; flex-shrink: 0; }
.plans { display: flex; gap: 10px; margin-bottom: 20px; }
.plan { flex: 1; padding: 14px; border-radius: var(--radius); border: 1.5px solid var(--border); cursor: pointer; transition: all 0.2s; background: var(--surface2); }
.plan.selected { border-color: var(--green); background: rgba(34,197,94,0.05); }
.plan.premium.selected { border-color: var(--gold); background: rgba(245,158,11,0.05); }
.plan-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; margin-bottom: 6px; }
.badge-free { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-pro { background: rgba(245,158,11,0.15); color: var(--gold); }
.plan-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.plan-price { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.plan-price span { font-size: 11px; font-weight: 400; color: var(--muted); }
.plan-features { font-size: 11px; color: var(--muted); line-height: 1.8; }
.submit-btn { width: 100%; padding: 15px; background: var(--green); color: #000; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-bottom: 14px; }
.submit-btn:hover { background: var(--green-dark); }
.submit-btn:disabled { background: var(--surface3); color: var(--muted); cursor: default; }
.error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--red); margin-bottom: 14px; display: none; line-height: 1.5; }
.success-msg { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--green); margin-bottom: 14px; display: none; }
.divider { display: flex; align-items: center; gap: 12px; margin: 14px 0; font-size: 12px; color: var(--muted); }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.google-btn { width: 100%; padding: 13px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; }
.google-btn:hover { background: var(--surface3); }
.forgot { text-align: right; margin-bottom: 16px; }
.forgot a { font-size: 13px; color: var(--green); text-decoration: none; }
.terms { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.6; }
.terms a { color: var(--green); text-decoration: none; }
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="logo">Call<span>did</span></div>
    <div class="tagline">Find. Call. Track. Local businesses made easy.</div>

    <div class="tabs">
      <button class="tab active" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      <button class="tab" id="tab-login" onclick="switchTab('login')">Log In</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- SIGNUP -->
    <div id="signupForm">
      <div class="field">
        <label class="f-label">Full Name</label>
        <input class="input" id="su-name" type="text" placeholder="John Smith" />
      </div>
      <div class="field">
        <label class="f-label">Email</label>
        <input class="input" id="su-email" type="email" placeholder="you@email.com" />
      </div>
      <div class="field">
        <label class="f-label">Password</label>
        <input class="input" id="su-password" type="password" placeholder="Min. 6 characters" />
      </div>
      <div class="field">
        <label class="f-label">Your City or Zip Code</label>
        <div class="loc-row">
          <input class="input" id="su-location" type="text" placeholder="e.g. Kansas City, MO or 64101" />
          <button class="loc-btn" onclick="detectLocation('su-location')">📍</button>
        </div>
      </div>
      <div class="plans">
        <div class="plan selected" id="plan-basic" onclick="selectPlan('basic')">
          <span class="plan-badge badge-free">FREE</span>
          <div class="plan-name">Basic</div>
          <div class="plan-price">$0<span>/mo</span></div>
          <div class="plan-features">✓ 2 lists<br>✓ Search & call<br>✓ Notes</div>
        </div>
        <div class="plan premium" id="plan-premium" onclick="selectPlan('premium')">
          <span class="plan-badge badge-pro">PRO</span>
          <div class="plan-name">Premium</div>
          <div class="plan-price">$4.99<span>/mo</span></div>
          <div class="plan-features">✓ Unlimited lists<br>✓ Share & export<br>✓ Priority support</div>
        </div>
      </div>
      <button class="submit-btn" id="signupBtn" onclick="handleSignup()">Create Account</button>
      <div class="divider">or</div>
      <button class="google-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <div class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></div>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" style="display:none">
      <div class="field">
        <label class="f-label">Email</label>
        <input class="input" id="li-email" type="email" placeholder="you@email.com" />
      </div>
      <div class="field">
        <label class="f-label">Password</label>
        <input class="input" id="li-password" type="password" placeholder="Your password" />
      </div>
      <div class="forgot"><a href="#" onclick="handleForgot()">Forgot password?</a></div>
      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Log In</button>
      <div class="divider">or</div>
      <button class="google-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<script>
// ── Supabase ──────────────────────────────────────────────────────
const SB_URL = 'https://issiqvhdydwmpcffwdvb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlzc2lxdmhkeWR3bXBjZmZ3ZHZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDg0NTgsImV4cCI6MjA4OTgyNDQ1OH0.3moRHY4r-SX2Z429kvXDLy1OPIJNjVRdzdNxcVEvTmU';
const sb = supabase.createClient(SB_URL, SB_KEY);

let selectedPlan = 'basic';

// Auto-redirect if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'index.html';
});

// ── Helpers ───────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  hideMessages();
}

function selectPlan(plan) {
  selectedPlan = plan;
  document.getElementById('plan-basic').classList.toggle('selected', plan === 'basic');
  document.getElementById('plan-premium').classList.toggle('selected', plan === 'premium');
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorMsg').style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
  document.getElementById('successMsg').textContent = msg;
  document.getElementById('successMsg').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}

function hideMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}

function setBusy(id, busy, label) {
  const btn = document.getElementById(id);
  btn.disabled = busy;
  btn.textContent = busy ? 'Please wait...' : label;
}

function detectLocation(id) {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`);
      const d = await r.json();
      const city = d.address.city || d.address.town || d.address.village || '';
      const state = d.address.state_code || '';
      document.getElementById(id).value = city ? `${city}, ${state}` : d.address.postcode || '';
    } catch(e) {}
  }, () => {});
}

// ── Sign Up ───────────────────────────────────────────────────────
async function handleSignup() {
  hideMessages();
  const name     = document.getElementById('su-name').value.trim();
  const email    = document.getElementById('su-email').value.trim();
  const password = document.getElementById('su-password').value;
  const location = document.getElementById('su-location').value.trim();

  if (!name)                        return showError('Please enter your name.');
  if (!email || !email.includes('@')) return showError('Please enter a valid email.');
  if (password.length < 6)          return showError('Password must be at least 6 characters.');
  if (!location)                    return showError('Please enter your city or zip code.');

  setBusy('signupBtn', true, 'Create Account');

  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { name, location, plan: selectedPlan } }
  });

  if (error) {
    showError(error.message);
    setBusy('signupBtn', false, 'Create Account');
    return;
  }

  // Save profile row
  if (data.user) {
    await sb.from('profiles').upsert({ id: data.user.id, name, location, plan: selectedPlan });
    localStorage.setItem('calldid_user', JSON.stringify({ name, email, location, plan: selectedPlan, joined: new Date().toLocaleDateString() }));
    window.location.href = 'index.html';
  } else {
    showError('Account created! Please log in.');
    switchTab('login');
    setBusy('signupBtn', false, 'Create Account');
  }
}

// ── Log In ────────────────────────────────────────────────────────
async function handleLogin() {
  hideMessages();
  const email    = document.getElementById('li-email').value.trim();
  const password = document.getElementById('li-password').value;

  if (!email || !email.includes('@')) return showError('Please enter a valid email.');
  if (!password)                      return showError('Please enter your password.');

  setBusy('loginBtn', true, 'Log In');

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showError('Wrong email or password. Please try again.');
    setBusy('loginBtn', false, 'Log In');
    return;
  }

  // Cache profile
  const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
  localStorage.setItem('calldid_user', JSON.stringify({
    name:     profile?.name     || data.user.user_metadata?.name || 'User',
    email,
    location: profile?.location || 'Kansas City, MO',
    plan:     profile?.plan     || 'basic',
    joined:   new Date(data.user.created_at).toLocaleDateString()
  }));

  window.location.href = 'index.html';
}

// ── Forgot password ───────────────────────────────────────────────
async function handleForgot() {
  const email = document.getElementById('li-email').value.trim();
  if (!email) return showError('Enter your email above first.');
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://3zq3mh.github.io/CallDid/auth.html'
  });
  if (error) showError(error.message);
  else showSuccess('Password reset email sent! Check your inbox.');
}

// ── Google ────────────────────────────────────────────────────────
async function handleGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://3zq3mh.github.io/CallDid/index.html' }
  });
}

// ── Enter key ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  document.getElementById('loginForm').style.display !== 'none' ? handleLogin() : handleSignup();
});
</script>
</body>
</html>
